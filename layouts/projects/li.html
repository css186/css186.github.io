<li class="portfolio-entry-card">
  <a class="portfolio-entry-link" href="{{ .Params.externalLink | default .RelPermalink }}">
    <span class="portfolio-entry-date">
    {{- if not .Date.IsZero -}}
      {{ .Date | time.Format (.Site.Params.dateFormat | default "2006-01-02") }}
    {{- end -}}
    </span>
    <span class="portfolio-entry-title">{{ .Title }}</span>
    {{ with .Description }}
      <span class="portfolio-entry-description">{{ . }}</span>
    {{ end }}
  </a>
</li>
