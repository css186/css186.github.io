name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    env:
      TINA_PUBLIC_CLIENT_ID: ${{ vars.TINA_PUBLIC_CLIENT_ID || secrets.TINA_PUBLIC_CLIENT_ID }}
      TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
      TINA_PUBLIC_BRANCH: main

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Verify TinaCMS environment
        run: |
          if [ -z "$TINA_PUBLIC_CLIENT_ID" ]; then
            echo "::error::Missing TinaCMS client id. Set TINA_PUBLIC_CLIENT_ID in the github-pages environment or repository Actions variables/secrets."
            exit 1
          fi
          if [ -z "$TINA_TOKEN" ]; then
            echo "::error::Missing TinaCMS token. Set TINA_TOKEN in the github-pages environment or repository Actions secrets."
            exit 1
          fi

      - name: Build TinaCMS admin
        run: npm run tinacms:build

      - name: Build Hugo
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
